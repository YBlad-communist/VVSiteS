<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админ-панель — VVSiteS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f6fa;color:#2c3e50}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f5f6fa}
.card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
#login-screen .card{width:400px;max-width:90vw}
#login-screen h2{margin-bottom:24px;text-align:center;font-size:22px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:4px}
.form-group input,.form-group textarea{width:100%;padding:10px 12px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;font-family:inherit}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:#3498db}
.form-group textarea{resize:vertical;min-height:60px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px;transition:.2s;text-decoration:none}
.btn-primary{background:#3498db;color:#fff}
.btn-primary:hover{background:#2980b9}
.btn-success{background:#27ae60;color:#fff}
.btn-success:hover{background:#219a52}
.btn-danger{background:#e74c3c;color:#fff}
.btn-danger:hover{background:#c0392b}
.btn-sm{padding:6px 12px;font-size:12px}
.error-msg{background:#fde8e8;color:#c0392b;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{text-align:left;padding:12px;border-bottom:1px solid #eee}
th{font-weight:600;color:#7f8c8d;font-size:12px;text-transform:uppercase}
tr:hover td{background:#f8f9fa}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.header h1{font-size:22px}
.logout-btn{background:#e74c3c;color:#fff;border:none;padding:8px 20px;border-radius:6px;cursor:pointer;font-size:14px}
.empty{text-align:center;padding:40px;color:#999;font-size:14px}
.loading{text-align:center;padding:40px;color:#999}
.main{max-width:1000px;margin:0 auto;padding:32px 20px}
.tabs{display:flex;gap:4px;margin-bottom:24px;background:#e8ecf0;border-radius:10px;padding:4px}
.tab{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;background:transparent;color:#555;transition:.2s}
.tab:hover{color:#2c3e50}
.tab.active{background:#fff;color:#2c3e50;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.tab-content{display:none}
.tab-content.active{display:block}
.actions-cell{display:flex;gap:6px}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:12px;padding:32px;width:480px;max-width:90vw;max-height:90vh;overflow-y:auto}
.modal h3{margin-bottom:20px;font-size:18px}
.modal .form-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:20px}
</style>
</head>
<body>
<div id="login-screen">
  <div class="card">
    <h2>Вход в админ-панель</h2>
    <div class="error-msg" id="login-error"></div>
    <div class="form-group">
      <label>Пароль</label>
      <input type="password" id="login-password" placeholder="••••••">
    </div>
    <button class="btn btn-primary" id="login-btn" style="width:100%;padding:12px">Войти</button>
  </div>
</div>

<div id="admin-panel" style="display:none">
  <div class="main">
    <div class="header">
      <h1>Панель управления</h1>
      <button class="logout-btn" id="logout-btn">Выйти</button>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="contacts">📋 Заявки</button>
      <button class="tab" data-tab="portfolio">📁 Портфолио</button>
    </div>

    <div class="tab-content active" id="tab-contacts">
      <div class="card">
        <table>
          <thead><tr><th>ID</th><th>Имя</th><th>Контакты</th><th>Сообщение</th><th>Дата</th></tr></thead>
          <tbody id="contacts-list"><tr><td colspan="5" class="loading">Загрузка...</td></tr></tbody>
        </table>
      </div>
    </div>

    <div class="tab-content" id="tab-portfolio">
      <div class="card" style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-weight:600">Проекты в портфолио</span>
        <button class="btn btn-success" id="add-portfolio-btn">+ Добавить проект</button>
      </div>
      <div class="card">
        <table>
          <thead><tr><th>ID</th><th>Название</th><th>Описание</th><th>Действия</th></tr></thead>
          <tbody id="portfolio-list"><tr><td colspan="4" class="loading">Загрузка...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">Редактировать</h3>
    <div id="modal-body"></div>
  </div>
</div>

<script>
async function apiFetch(url, options = {}) {
  const res = await fetch(url, { credentials: 'include', ...options, headers: { 'Content-Type': 'application/json', ...options.headers } });
  const data = await res.json();
  if (!res.ok && data.error) throw new Error(data.error);
  if (!res.ok) throw new Error('Ошибка сервера');
  return data;
}

async function checkAuth() {
  try { await apiFetch('/api/admin/contacts'); return true; }
  catch { return false; }
}

async function initApp() {
  if (await checkAuth()) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    loadContacts();
    loadPortfolio();
  }
}

document.getElementById('login-btn').addEventListener('click', async () => {
  const password = document.getElementById('login-password').value.trim();
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  if (!password) { errEl.textContent = 'Введите пароль'; errEl.style.display = 'block'; return; }
  try {
    await apiFetch('/api/admin/login', { method: 'POST', body: JSON.stringify({ password }) });
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    loadContacts();
    loadPortfolio();
  } catch (e) { errEl.textContent = e.message; errEl.style.display = 'block'; }
});

document.getElementById('logout-btn').addEventListener('click', async () => {
  await apiFetch('/api/admin/logout', { method: 'POST' });
  document.getElementById('admin-panel').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-password').value = '';
});

document.getElementById('login-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-btn').click();
});

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
  });
});

async function loadContacts() {
  try {
    const contacts = await apiFetch('/api/admin/contacts');
    const tbody = document.getElementById('contacts-list');
    if (!contacts.length) { tbody.innerHTML = '<tr><td colspan="5" class="empty">Нет заявок</td></tr>'; return; }
    tbody.innerHTML = contacts.map(c =>
      `<tr><td>${c.id}</td><td>${c.name}</td><td>${c.email}</td><td style="max-width:300px;word-break:break-word">${c.message}</td><td>${new Date(c.created_at+'Z').toLocaleString('ru-RU')}</td></tr>`
    ).join('');
  } catch (e) { document.getElementById('contacts-list').innerHTML = `<tr><td colspan="5" class="empty">Ошибка: ${e.message}</td></tr>`; }
}

async function loadPortfolio() {
  try {
    const items = await apiFetch('/api/admin/portfolio');
    const tbody = document.getElementById('portfolio-list');
    if (!items.length) { tbody.innerHTML = '<tr><td colspan="4" class="empty">Нет проектов</td></tr>'; return; }
    tbody.innerHTML = items.map(p =>
      `<tr><td>${p.id}</td><td>${p.title}</td><td style="max-width:250px;word-break:break-word">${p.description}</td><td><div class="actions-cell"><button class="btn btn-primary btn-sm" onclick="editPortfolio(${p.id})">✏️</button><button class="btn btn-danger btn-sm" onclick="deletePortfolio(${p.id})">🗑️</button></div></td></tr>`
    ).join('');
  } catch (e) { document.getElementById('portfolio-list').innerHTML = `<tr><td colspan="4" class="empty">Ошибка: ${e.message}</td></tr>`; }
}

function showModal(title, html) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('active');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('active'); }
document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

document.getElementById('add-portfolio-btn').addEventListener('click', () => {
  showModal('Добавить проект', `
    <div class="form-group"><label>Название</label><input type="text" id="pf-title"></div>
    <div class="form-group"><label>Описание</label><textarea id="pf-desc"></textarea></div>
    <div class="form-group"><label>URL изображения (необязательно)</label><input type="text" id="pf-image" placeholder="https://..."></div>
    <div class="form-group"><label>Ссылка (необязательно)</label><input type="text" id="pf-link" placeholder="https://..."></div>
    <div class="form-actions"><button class="btn" onclick="closeModal()">Отмена</button><button class="btn btn-success" onclick="createPortfolio()">Создать</button></div>
  `);
});

window.createPortfolio = async () => {
  const title = document.getElementById('pf-title').value.trim();
  const description = document.getElementById('pf-desc').value.trim();
  const image = document.getElementById('pf-image').value.trim();
  const link = document.getElementById('pf-link').value.trim();
  if (!title) { alert('Название обязательно'); return; }
  try {
    await apiFetch('/api/admin/portfolio', { method: 'POST', body: JSON.stringify({ title, description, image, link }) });
    closeModal(); loadPortfolio();
  } catch (e) { alert(e.message); }
};

window.editPortfolio = async (id) => {
  const items = await apiFetch('/api/admin/portfolio');
  const p = items.find(i => i.id === id);
  if (!p) return;
  showModal('Редактировать проект', `
    <div class="form-group"><label>Название</label><input type="text" id="pf-title" value="${(p.title||'').replace(/"/g,'&quot;')}"></div>
    <div class="form-group"><label>Описание</label><textarea id="pf-desc">${(p.description||'').replace(/"/g,'&quot;')}</textarea></div>
    <div class="form-group"><label>URL изображения</label><input type="text" id="pf-image" value="${(p.image||'').replace(/"/g,'&quot;')}"></div>
    <div class="form-group"><label>Ссылка</label><input type="text" id="pf-link" value="${(p.link||'').replace(/"/g,'&quot;')}"></div>
    <div class="form-actions"><button class="btn" onclick="closeModal()">Отмена</button><button class="btn btn-primary" onclick="updatePortfolio(${id})">Сохранить</button></div>
  `);
};

window.updatePortfolio = async (id) => {
  const title = document.getElementById('pf-title').value.trim();
  const description = document.getElementById('pf-desc').value.trim();
  const image = document.getElementById('pf-image').value.trim();
  const link = document.getElementById('pf-link').value.trim();
  if (!title) { alert('Название обязательно'); return; }
  try {
    await apiFetch(`/api/admin/portfolio/${id}`, { method: 'PUT', body: JSON.stringify({ title, description, image, link }) });
    closeModal(); loadPortfolio();
  } catch (e) { alert(e.message); }
};

window.deletePortfolio = async (id) => {
  if (!confirm('Удалить проект?')) return;
  try { await apiFetch(`/api/admin/portfolio/${id}`, { method: 'DELETE' }); loadPortfolio(); }
  catch (e) { alert(e.message); }
};

initApp();
</script>
</body>
</html>
