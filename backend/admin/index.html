<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админ-панель — VVSiteS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f6fa;color:#2c3e50;display:flex;min-height:100vh}
.sidebar{width:260px;background:#2c3e50;color:#ecf0f1;padding:24px 0;flex-shrink:0;position:fixed;height:100vh;overflow-y:auto}
.sidebar h2{padding:0 20px 24px;font-size:18px;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:8px}
.sidebar nav a{display:flex;align-items:center;gap:10px;padding:12px 20px;color:#bdc3c7;text-decoration:none;transition:.2s;font-size:14px}
.sidebar nav a:hover,.sidebar nav a.active{background:rgba(255,255,255,.1);color:#fff}
.main{margin-left:260px;flex:1;padding:32px;min-height:100vh}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px}
.header h1{font-size:24px}
.logout-btn{background:#e74c3c;color:#fff;border:none;padding:8px 20px;border-radius:6px;cursor:pointer;font-size:14px}
.section{display:none}
.section.active{display:block}
.card{background:#fff;border-radius:12px;padding:24px;margin-bottom:24px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{text-align:left;padding:12px;border-bottom:1px solid #eee}
th{font-weight:600;color:#7f8c8d;font-size:12px;text-transform:uppercase}
tr:hover td{background:#f8f9fa}
.badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:500}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;transition:.2s;text-decoration:none}
.btn-primary{background:#3498db;color:#fff}
.btn-primary:hover{background:#2980b9}
.btn-danger{background:#e74c3c;color:#fff}
.btn-danger:hover{background:#c0392b}
.btn-success{background:#27ae60;color:#fff}
.btn-success:hover{background:#219a52}
.btn-sm{padding:5px 12px;font-size:12px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:4px}
.form-group input,.form-group textarea{width:100%;padding:10px 12px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;transition:.2s;font-family:inherit}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:#3498db}
.form-group textarea{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:12px;padding:32px;width:480px;max-width:90vw;max-height:90vh;overflow-y:auto}
.modal h3{margin-bottom:20px;font-size:18px}
.modal .form-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:20px}
.loading{text-align:center;padding:40px;color:#999}
.empty{text-align:center;padding:40px;color:#999;font-size:14px}
.actions-cell{display:flex;gap:8px}
@media(max-width:768px){
  .sidebar{width:200px}
  .main{margin-left:200px;padding:20px}
  .form-row{grid-template-columns:1fr}
}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f5f6fa}
#login-screen .card{width:400px;max-width:90vw}
#login-screen h2{margin-bottom:24px;text-align:center;font-size:22px}
.error-msg{background:#fde8e8;color:#c0392b;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
.success-msg{background:#e8f8f0;color:#27ae60;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
</style>
</head>
<body>
<div id="login-screen">
  <div class="card">
    <h2>Вход в админ-панель</h2>
    <div class="error-msg" id="login-error"></div>
    <div class="form-group">
      <label>Логин</label>
      <input type="text" id="login-username" placeholder="admin">
    </div>
    <div class="form-group">
      <label>Пароль</label>
      <input type="password" id="login-password" placeholder="••••••">
    </div>
    <button class="btn btn-primary" id="login-btn" style="width:100%;justify-content:center;padding:12px">Войти</button>
  </div>
</div>

<div id="admin-panel" style="display:none">
  <div class="sidebar">
    <h2>Панель управления</h2>
    <nav>
      <a href="#" data-section="contacts" class="active">📋 Заявки</a>
      <a href="#" data-section="services">🛠️ Услуги</a>
      <a href="#" data-section="portfolio">📁 Портфолио</a>
    </nav>
  </div>
  <div class="main">
    <div class="header">
      <h1 id="section-title">Заявки</h1>
      <button class="logout-btn" id="logout-btn">Выйти</button>
    </div>

    <div class="section active" id="section-contacts">
      <div class="card">
        <table>
          <thead><tr><th>ID</th><th>Имя</th><th>Email</th><th>Сообщение</th><th>Дата</th></tr></thead>
          <tbody id="contacts-list"><tr><td colspan="5" class="loading">Загрузка...</td></tr></tbody>
        </table>
      </div>
    </div>

    <div class="section" id="section-services">
      <div class="card" style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-weight:600">Управление услугами</span>
        <button class="btn btn-primary" id="add-service-btn">+ Добавить услугу</button>
      </div>
      <div class="card">
        <table>
          <thead><tr><th>ID</th><th>Название</th><th>Описание</th><th>Цена</th><th>Действия</th></tr></thead>
          <tbody id="services-list"><tr><td colspan="5" class="loading">Загрузка...</td></tr></tbody>
        </table>
      </div>
    </div>

    <div class="section" id="section-portfolio">
      <div class="card" style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-weight:600">Управление портфолио</span>
        <button class="btn btn-primary" id="add-portfolio-btn">+ Добавить работу</button>
      </div>
      <div class="card">
        <table>
          <thead><tr><th>ID</th><th>Название</th><th>Описание</th><th>Действия</th></tr></thead>
          <tbody id="portfolio-list"><tr><td colspan="4" class="loading">Загрузка...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">Редактировать</h3>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const API = '/api';
let token = localStorage.getItem('admin-token');

function getHeaders() {
  return {
    'Content-Type': 'application/json',
    ...(token ? { 'Authorization': `Bearer ${token}` } : {}),
  };
}

async function apiFetch(url, options = {}) {
  const res = await fetch(url, { ...options, headers: { ...getHeaders(), ...options.headers } });
  const data = await res.json();
  if (!res.ok && data.error) throw new Error(data.error);
  if (!res.ok) throw new Error('Ошибка сервера');
  return data;
}

function showError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('login-error').style.display = 'none';
}

async function checkAuth() {
  if (!token) return false;
  try {
    await apiFetch(`${API}/admin/contacts`);
    return true;
  } catch {
    return false;
  }
}

async function initApp() {
  const isAuth = await checkAuth();
  if (isAuth) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'flex';
    loadContacts();
    loadServices();
    loadPortfolio();
  }
}

document.getElementById('login-btn').addEventListener('click', async () => {
  const login = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value.trim();
  hideError();
  if (!login || !password) { showError('Заполните все поля'); return; }
  try {
    const data = await apiFetch(`${API}/admin/login`, {
      method: 'POST',
      body: JSON.stringify({ login, password }),
    });
    token = data.token;
    localStorage.setItem('admin-token', token);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'flex';
    loadContacts();
    loadServices();
    loadPortfolio();
  } catch (err) {
    showError(err.message);
  }
});

document.getElementById('logout-btn').addEventListener('click', () => {
  token = null;
  localStorage.removeItem('admin-token');
  document.getElementById('admin-panel').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-password').value = '';
});

document.querySelectorAll('.sidebar nav a').forEach(a => {
  a.addEventListener('click', e => {
    e.preventDefault();
    document.querySelectorAll('.sidebar nav a').forEach(x => x.classList.remove('active'));
    a.classList.add('active');
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    const section = document.getElementById(`section-${a.dataset.section}`);
    if (section) section.classList.add('active');
    document.getElementById('section-title').textContent = a.textContent.trim();
  });
});

async function loadContacts() {
  try {
    const contacts = await apiFetch(`${API}/admin/contacts`);
    const tbody = document.getElementById('contacts-list');
    if (!contacts.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty">Нет заявок</td></tr>';
      return;
    }
    tbody.innerHTML = contacts.map(c => `
      <tr>
        <td>${c.id}</td>
        <td>${c.name}</td>
        <td>${c.email}</td>
        <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${c.message.replace(/"/g,'&quot;')}">${c.message}</td>
        <td>${new Date(c.created_at+'Z').toLocaleString('ru-RU')}</td>
      </tr>
    `).join('');
  } catch (err) {
    document.getElementById('contacts-list').innerHTML = `<tr><td colspan="5" class="empty">Ошибка загрузки: ${err.message}</td></tr>`;
  }
}

async function loadServices() {
  try {
    const services = await apiFetch(`${API}/services`);
    const tbody = document.getElementById('services-list');
    if (!services.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty">Нет услуг</td></tr>';
      return;
    }
    tbody.innerHTML = services.map(s => `
      <tr>
        <td>${s.id}</td>
        <td>${s.title}</td>
        <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${s.description.replace(/"/g,'&quot;')}">${s.description}</td>
        <td>${s.price}</td>
        <td>
          <div class="actions-cell">
            <button class="btn btn-primary btn-sm" onclick="editService(${s.id},'${s.title.replace(/'/g,"\\'")}','${s.description.replace(/'/g,"\\'")}','${s.price.replace(/'/g,"\\'")}')">✏️</button>
            <button class="btn btn-danger btn-sm" onclick="deleteService(${s.id})">🗑️</button>
          </div>
        </td>
      </tr>
    `).join('');
  } catch (err) {
    document.getElementById('services-list').innerHTML = `<tr><td colspan="5" class="empty">Ошибка загрузки: ${err.message}</td></tr>`;
  }
}

async function loadPortfolio() {
  try {
    const items = await apiFetch(`${API}/portfolio`);
    const tbody = document.getElementById('portfolio-list');
    if (!items.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty">Нет работ</td></tr>';
      return;
    }
    tbody.innerHTML = items.map(p => `
      <tr>
        <td>${p.id}</td>
        <td>${p.title}</td>
        <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${p.description.replace(/"/g,'&quot;')}">${p.description}</td>
        <td>
          <div class="actions-cell">
            <button class="btn btn-primary btn-sm" onclick="editPortfolio(${p.id},'${p.title.replace(/'/g,"\\'")}','${p.description.replace(/'/g,"\\'")}','${p.image.replace(/'/g,"\\'")}','${p.link.replace(/'/g,"\\'")}')">✏️</button>
            <button class="btn btn-danger btn-sm" onclick="deletePortfolio(${p.id})">🗑️</button>
          </div>
        </td>
      </tr>
    `).join('');
  } catch (err) {
    document.getElementById('portfolio-list').innerHTML = `<tr><td colspan="4" class="empty">Ошибка загрузки: ${err.message}</td></tr>`;
  }
}

function showModal(title, bodyHtml) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  document.getElementById('modal-overlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
}

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

document.getElementById('add-service-btn').addEventListener('click', () => {
  showModal('Добавить услугу', `
    <div class="form-group"><label>Название</label><input type="text" id="svc-title"></div>
    <div class="form-group"><label>Описание</label><textarea id="svc-desc"></textarea></div>
    <div class="form-group"><label>Цена</label><input type="text" id="svc-price"></div>
    <div class="form-actions">
      <button class="btn" onclick="closeModal()">Отмена</button>
      <button class="btn btn-success" onclick="createService()">Создать</button>
    </div>
  `);
});

window.editService = (id, title, desc, price) => {
  showModal('Редактировать услугу', `
    <div class="form-group"><label>Название</label><input type="text" id="svc-title" value="${title.replace(/"/g,'&quot;')}"></div>
    <div class="form-group"><label>Описание</label><textarea id="svc-desc">${desc.replace(/"/g,'&quot;')}</textarea></div>
    <div class="form-group"><label>Цена</label><input type="text" id="svc-price" value="${price.replace(/"/g,'&quot;')}"></div>
    <div class="form-actions">
      <button class="btn" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" onclick="updateService(${id})">Сохранить</button>
    </div>
  `);
};

window.createService = async () => {
  const title = document.getElementById('svc-title').value.trim();
  const description = document.getElementById('svc-desc').value.trim();
  const price = document.getElementById('svc-price').value.trim();
  if (!title || !description || !price) { alert('Заполните все поля'); return; }
  try {
    await apiFetch(`${API}/admin/services`, { method: 'POST', body: JSON.stringify({ title, description, price }) });
    closeModal();
    loadServices();
  } catch (err) { alert(err.message); }
};

window.updateService = async (id) => {
  const title = document.getElementById('svc-title').value.trim();
  const description = document.getElementById('svc-desc').value.trim();
  const price = document.getElementById('svc-price').value.trim();
  if (!title || !description || !price) { alert('Заполните все поля'); return; }
  try {
    await apiFetch(`${API}/admin/services/${id}`, { method: 'PUT', body: JSON.stringify({ title, description, price }) });
    closeModal();
    loadServices();
  } catch (err) { alert(err.message); }
};

window.deleteService = async (id) => {
  if (!confirm('Удалить услугу?')) return;
  try {
    await apiFetch(`${API}/admin/services/${id}`, { method: 'DELETE' });
    loadServices();
  } catch (err) { alert(err.message); }
};

document.getElementById('add-portfolio-btn').addEventListener('click', () => {
  showModal('Добавить работу', `
    <div class="form-group"><label>Название</label><input type="text" id="pf-title"></div>
    <div class="form-group"><label>Описание</label><textarea id="pf-desc"></textarea></div>
    <div class="form-group"><label>URL изображения</label><input type="text" id="pf-image"></div>
    <div class="form-group"><label>Ссылка</label><input type="text" id="pf-link"></div>
    <div class="form-actions">
      <button class="btn" onclick="closeModal()">Отмена</button>
      <button class="btn btn-success" onclick="createPortfolio()">Создать</button>
    </div>
  `);
});

window.editPortfolio = (id, title, desc, image, link) => {
  showModal('Редактировать работу', `
    <div class="form-group"><label>Название</label><input type="text" id="pf-title" value="${title.replace(/"/g,'&quot;')}"></div>
    <div class="form-group"><label>Описание</label><textarea id="pf-desc">${desc.replace(/"/g,'&quot;')}</textarea></div>
    <div class="form-group"><label>URL изображения</label><input type="text" id="pf-image" value="${image.replace(/"/g,'&quot;')}"></div>
    <div class="form-group"><label>Ссылка</label><input type="text" id="pf-link" value="${link.replace(/"/g,'&quot;')}"></div>
    <div class="form-actions">
      <button class="btn" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" onclick="updatePortfolio(${id})">Сохранить</button>
    </div>
  `);
};

window.createPortfolio = async () => {
  const title = document.getElementById('pf-title').value.trim();
  const description = document.getElementById('pf-desc').value.trim();
  const image = document.getElementById('pf-image').value.trim();
  const link = document.getElementById('pf-link').value.trim();
  if (!title) { alert('Название обязательно'); return; }
  try {
    await apiFetch(`${API}/admin/portfolio`, { method: 'POST', body: JSON.stringify({ title, description, image, link }) });
    closeModal();
    loadPortfolio();
  } catch (err) { alert(err.message); }
};

window.updatePortfolio = async (id) => {
  const title = document.getElementById('pf-title').value.trim();
  const description = document.getElementById('pf-desc').value.trim();
  const image = document.getElementById('pf-image').value.trim();
  const link = document.getElementById('pf-link').value.trim();
  if (!title) { alert('Название обязательно'); return; }
  try {
    await apiFetch(`${API}/admin/portfolio/${id}`, { method: 'PUT', body: JSON.stringify({ title, description, image, link }) });
    closeModal();
    loadPortfolio();
  } catch (err) { alert(err.message); }
};

window.deletePortfolio = async (id) => {
  if (!confirm('Удалить работу?')) return;
  try {
    await apiFetch(`${API}/admin/portfolio/${id}`, { method: 'DELETE' });
    loadPortfolio();
  } catch (err) { alert(err.message); }
};

document.getElementById('login-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-btn').click();
});

initApp();
</script>
</body>
</html>
